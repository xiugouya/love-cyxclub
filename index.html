<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱心节 · 九（3）班 | CYX俱乐部</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #fff5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #333;
      line-height: 1.8;
    }
    /* 顶部横幅 */
    .hero {
      background: linear-gradient(135deg, #e74c3c 0%, #ff6b81 50%, #ff8e53 100%);
      color: #fff;
      text-align: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 40px;
      background: #fff5f5;
      clip-path: ellipse(55% 100% at 50% 100%);
    }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }
    .hero .emoji-row {
      font-size: 2rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .hero p {
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 500px;
      margin: 0 auto;
    }

    /* 内容区 */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* 赞助商横幅 */
    .sponsor {
      background: #fff;
      border: 2px solid #fecaca;
      border-radius: 16px;
      padding: 24px 32px;
      margin: -30px auto 40px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(231,76,60,0.08);
      position: relative;
    }
    .sponsor-badge {
      display: inline-block;
      background: linear-gradient(135deg, #e74c3c, #ff6b81);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .sponsor h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .sponsor p {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .sponsor a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #e74c3c;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .sponsor a:hover {
      color: #c0392b;
      transform: translateX(3px);
    }

    /* 内容卡片 */
    .section {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .section h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e74c3c;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section h3::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 22px;
      background: linear-gradient(180deg, #e74c3c, #ff6b81);
      border-radius: 2px;
    }

    /* 可编辑区域 */
    .editable {
      background: #fef9f9;
      border: 1px dashed #fecaca;
      border-radius: 12px;
      padding: 20px;
      min-height: 100px;
      color: #555;
    }
    .editable:empty::before {
      content: attr(data-placeholder);
      color: #ccc;
      font-style: italic;
    }

    /* 活动信息 */
    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 0;
    }
    .info-card {
      background: #fef9f9;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .info-card .icon {
      font-size: 2rem;
      margin-bottom: 8px;
    }
    .info-card .label {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .info-card .value {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      font-size: 0.8rem;
    }
    .footer a {
      color: #e74c3c;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; }
      .section { padding: 24px; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="emoji-row">❤️ 🔥 ❤️</div>
    <h1>爱心节</h1>
    <p>九（3）班 · 让爱传递，温暖每一颗心</p>
  </div>

  <div class="container">

    <!-- 赞助商横幅 -->
    <div class="sponsor">
      <div class="sponsor-badge">独家赞助</div>
      <h2>🌟 CYX俱乐部 独家赞助 🌟</h2>
      <p>本活动由 CYX俱乐部 独家赞助支持</p>
      <a href="https://cyxclub.top">前往 cyxclub.top →</a>
    </div>

    <!-- 活动信息 -->
    <div class="section">
      <h3>活动信息</h3>
      <div class="info-grid">
        <div class="info-card">
          <div class="icon">📅</div>
          <div class="label">活动日期</div>
          <div class="value" contenteditable="true" data-placeholder="填写日期">（请填写）</div>
        </div>
        <div class="info-card">
          <div class="icon">📍</div>
          <div class="label">活动地点</div>
          <div class="value" contenteditable="true" data-placeholder="填写地点">（请填写）</div>
        </div>
        <div class="info-card">
          <div class="icon">🏫</div>
          <div class="label">班级</div>
          <div class="value">九（3）班</div>
        </div>
        <div class="info-card">
          <div class="icon">💝</div>
          <div class="label">主题</div>
          <div class="value" contenteditable="true" data-placeholder="填写主题">（请填写）</div>
        </div>
      </div>
    </div>

    <!-- 活动介绍（可编辑） -->
    <div class="section">
      <h3>活动介绍</h3>
      <div class="editable" contenteditable="true" data-placeholder="在这里输入你们班爱心节活动的介绍内容……">
        在这里输入你们班爱心节活动的介绍内容……
      </div>
    </div>

    <!-- 活动流程（可编辑） -->
    <div class="section">
      <h3>活动流程</h3>
      <div class="editable" contenteditable="true" data-placeholder="例如：&#10;14:00 - 开幕式&#10;14:30 - 爱心义卖&#10;16:00 - 互动游戏&#10;17:00 - 总结颁奖">
        在这里输入活动流程安排……
      </div>
    </div>

    <!-- 心愿/口号（可编辑） -->
    <div class="section">
      <h3>班级心愿</h3>
      <div class="editable" contenteditable="true" data-placeholder="写下你们班在爱心节想要传递的心愿或口号……">
        在这里写下班级心愿或口号……
      </div>
    </div>

    <!-- 更多内容区 -->
    <div class="section">
      <h3>更多精彩内容</h3>
      <div class="editable" contenteditable="true" data-placeholder="可以放照片描述、同学感言、活动花絮等等……">
        在这里添加更多内容……
      </div>
    </div>

  </div>

  <div class="footer">
    <p>由 <a href="https://cyxclub.top">CYX俱乐部</a> 独家赞助 ❤️</p>
    <p style="margin-top:4px;">love.cyxclub.top</p>
  </div>

</body>
</html>
