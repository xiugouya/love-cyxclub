<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>九（3）爱心节</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.css">
    <style>
        :root {
            --love-red: #e74c3c;
            --love-pink: #ff6b81;
            --love-dark: #1a1a2e;
            --love-card: #16213e;
            --love-border: #2a2a4a;
            --love-text: #e0e0e0;
            --love-gray: #888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--love-dark);
            color: var(--love-text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 浮动爱心背景 */
        .hearts-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .hearts-bg span {
            position: absolute;
            bottom: -40px;
            font-size: 20px;
            opacity: 0.12;
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(0) rotate(0deg); opacity: 0.12; }
            50%  { opacity: 0.2; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* 顶部赞助条 */
        .sponsor-bar {
            background: linear-gradient(90deg, var(--love-red), var(--love-pink));
            color: #fff;
            text-align: center;
            padding: 12px 20px;
            font-size: 14px;
            font-weight: 600;
            position: relative;
            z-index: 10;
        }
        .sponsor-bar a {
            color: #fff;
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: opacity 0.3s;
        }
        .sponsor-bar a:hover { opacity: 0.8; }

        /* 主标题区 */
        .hero {
            text-align: center;
            padding: 80px 20px 50px;
            position: relative;
            z-index: 1;
        }
        .hero-icon {
            font-size: 64px;
            color: var(--love-pink);
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .hero h1 {
            font-size: 42px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--love-pink), #fff, var(--love-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
        }
        .hero p {
            font-size: 16px;
            color: var(--love-gray);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* 内容区 */
        .content {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px 60px;
            position: relative;
            z-index: 1;
        }

        /* 卡片 */
        .section-card {
            background: rgba(22, 33, 62, 0.6);
            border: 1px solid var(--love-border);
            border-radius: 16px;
            padding: 32px;
            margin-bottom: 24px;
            transition: border-color 0.3s;
        }
        .section-card:hover { border-color: var(--love-pink); }
        .section-card h2 {
            font-size: 20px;
            color: var(--love-pink);
            margin-bottom: 16px;
            font-weight: 700;
        }
        .section-card h2 i { margin-right: 8px; }

        /* 招揽话语 */
        .welcome-text {
            text-align: center;
            padding: 16px 0;
        }
        .welcome-text p {
            font-size: 16px;
            line-height: 2;
            color: var(--love-text);
        }
        .welcome-text .highlight {
            color: var(--love-pink);
            font-weight: 700;
            font-size: 18px;
        }
        .welcome-text .tag {
            display: inline-block;
            margin: 8px 4px;
            padding: 4px 14px;
            background: rgba(231,76,60,0.15);
            border: 1px solid rgba(231,76,60,0.3);
            border-radius: 20px;
            font-size: 13px;
            color: var(--love-pink);
        }

        /* 留言板 */
        .guestbook { margin-bottom: 24px; }
        .msg-subtitle {
            color: var(--love-gray);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .msg-form {
            background: var(--love-card);
            border: 1px solid var(--love-border);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 24px;
        }
        .msg-form .row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }
        .msg-form input {
            flex: 1;
            padding: 10px 14px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid var(--love-border);
            border-radius: 10px;
            font-size: 15px;
            outline: none;
            color: var(--love-text);
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .msg-form input:focus { border-color: var(--love-pink); }
        .msg-form textarea {
            width: 100%;
            padding: 12px 14px;
            background: rgba(255,255,255,0.05);
            border: 1.5px solid var(--love-border);
            border-radius: 10px;
            font-size: 15px;
            resize: vertical;
            min-height: 80px;
            outline: none;
            color: var(--love-text);
            transition: border-color 0.2s;
            font-family: inherit;
        }
        .msg-form textarea:focus { border-color: var(--love-pink); }
        .msg-form input::placeholder, .msg-form textarea::placeholder { color: #555; }

        .emoji-row-input {
            display: flex;
            gap: 6px;
            margin: 10px 0;
            flex-wrap: wrap;
        }
        .emoji-btn {
            background: rgba(255,255,255,0.05);
            border: 1.5px solid var(--love-border);
            border-radius: 8px;
            padding: 4px 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .emoji-btn:hover, .emoji-btn.active {
            background: rgba(231,76,60,0.2);
            border-color: var(--love-pink);
            transform: scale(1.15);
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--love-red), var(--love-pink));
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 4px;
            font-family: inherit;
        }
        .submit-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(231,76,60,0.3);
        }
        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .msg-count { text-align: right; color: var(--love-gray); font-size: 13px; margin-bottom: 12px; }
        .msg-list { display: flex; flex-direction: column; gap: 12px; }
        .msg-card {
            background: var(--love-card);
            border: 1px solid var(--love-border);
            border-radius: 14px;
            padding: 20px 24px;
            position: relative;
            animation: slideIn 0.3s ease;
            transition: border-color 0.3s;
        }
        .msg-card:hover { border-color: var(--love-pink); }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .msg-name { font-weight: 700; color: var(--love-pink); font-size: 15px; }
        .msg-emoji { font-size: 1.3rem; }
        .msg-body { color: var(--love-text); font-size: 15px; line-height: 1.7; margin-bottom: 8px; }
        .msg-time { font-size: 12px; color: var(--love-gray); }
        .msg-like {
            position: absolute; top: 16px; right: 16px;
            background: none; border: 1.5px solid var(--love-border);
            border-radius: 20px; padding: 3px 10px;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s; color: var(--love-gray);
        }
        .msg-like:hover, .msg-like.liked {
            border-color: var(--love-pink);
            color: var(--love-pink);
            background: rgba(231,76,60,0.15);
        }
        .empty-msg { text-align: center; color: var(--love-gray); padding: 40px 20px; font-size: 15px; }

        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px 20px;
            border-top: 1px solid var(--love-border);
            position: relative;
            z-index: 1;
        }
        .footer-logo {
            font-size: 24px;
            font-weight: 800;
            color: var(--love-pink);
            margin-bottom: 8px;
        }
        .footer p { font-size: 13px; color: var(--love-gray); }
        .footer a {
            color: var(--love-pink);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.3s;
        }
        .footer a:hover { opacity: 0.7; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 30px; }
            .hero { padding: 60px 16px 30px; }
            .section-card, .msg-form { padding: 24px 20px; }
            .msg-form .row { flex-direction: column; }
        }
    </style>
</head>
<body>

    <!-- 浮动爱心 -->
    <div class="hearts-bg" id="heartsBg"></div>

    <!-- 赞助条 -->
    <div class="sponsor-bar">
        <i class="fas fa-heart"></i> 本网站由 <a href="https://cyxclub.top" target="_blank">CYX俱乐部</a> 赞助
    </div>

    <!-- 主标题 -->
    <section class="hero">
        <div class="hero-icon"><i class="fas fa-heart"></i></div>
        <h1>爱心节</h1>
        <p>用爱心点亮校园，以行动传递美好</p>
    </section>

    <div class="content">

        <!-- 招揽话语 -->
        <div class="section-card">
            <h2><i class="fas fa-store"></i> 欢迎光临</h2>
            <div class="welcome-text">
                <p>
                    <span class="highlight">九（3）班爱心小铺</span> 现已开张！
                </p>
                <p>
                    手工美食、精美物件、趣味游戏……<br>
                    每一份消费，都是一份爱心
                </p>
                <p style="margin-top: 12px;">
                    <span class="tag">📍 地点：九（3）班</span>
                    <span class="tag">💝 全部收入捐赠公益</span>
                </p>
                <p style="margin-top: 16px; font-size: 15px;">
                    欢迎来逛！路过的同学、老师、家长们，<br>
                    九（3）班等你来玩！
                </p>
            </div>
        </div>

        <!-- 留言板 -->
        <div class="section-card guestbook">
            <h2><i class="fas fa-comments"></i> 留言板</h2>
            <p class="msg-subtitle">写下你对九（3）班爱心节的祝福</p>

            <div class="msg-form">
                <div class="row">
                    <input type="text" id="msgName" placeholder="你的昵称" maxlength="20">
                </div>
                <textarea id="msgText" placeholder="有爱评论，说点好听的" maxlength="300"></textarea>
                <div class="emoji-row-input">
                    <button class="emoji-btn" data-emoji="❤️">❤️</button>
                    <button class="emoji-btn" data-emoji="🥰">🥰</button>
                    <button class="emoji-btn" data-emoji="👏">👏</button>
                    <button class="emoji-btn" data-emoji="🎉">🎉</button>
                    <button class="emoji-btn" data-emoji="🔥">🔥</button>
                    <button class="emoji-btn" data-emoji="💪">💪</button>
                    <button class="emoji-btn" data-emoji="✨">✨</button>
                    <button class="emoji-btn" data-emoji="🌈">🌈</button>
                    <button class="emoji-btn" data-emoji="🌻">🌻</button>
                    <button class="emoji-btn" data-emoji="🕊️">🕊️</button>
                </div>
                <button class="submit-btn" id="submitBtn">发送留言 ❤️</button>
            </div>

            <div class="msg-count" id="msgCount"></div>
            <div class="msg-list" id="msgList">
                <div class="empty-msg">加载中...</div>
            </div>
        </div>

    </div>

    <!-- 底部 -->
    <footer class="footer">
        <div class="footer-logo">CYX 俱乐部</div>
        <p><a href="https://cyxclub.top"><i class="fas fa-external-link-alt"></i> 访问CYX俱乐部官网</a></p>
        <p style="margin-top: 10px;">© 2026 CYX俱乐部. All rights reserved.</p>
    </footer>

    <script>
        // ============================================
        // 后端 API 地址 — 替换为你自己的后端地址
        // 本地测试: http://localhost:3000
        // 部署后改成服务器地址，例如: http://123.45.67.89:3000
        // ============================================
        const API_BASE = 'https://orientally-statued-dewitt.ngrok-free.dev';

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        function formatTime(ts) {
            const d = new Date(ts);
            const pad = n => String(n).padStart(2, '0');
            return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
        }

        async function fetchMessages() {
            try {
                const res = await fetch(`${API_BASE}/api/messages`, {
                    headers: { 'ngrok-skip-browser-warning': 'true' }
                });
                if (!res.ok) throw new Error('fetch failed');
                return await res.json();
            } catch (e) { console.error('获取留言失败:', e); return []; }
        }

        async function postMessage(data) {
            const res = await fetch(`${API_BASE}/api/messages`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': 'true' },
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error('post failed');
            return await res.json();
        }

        async function likeMessage(id) {
            const res = await fetch(`${API_BASE}/api/messages/${id}/like`, { method: 'POST', headers: { 'ngrok-skip-browser-warning': 'true' } });
            if (!res.ok) throw new Error('like failed');
            return await res.json();
        }

        async function renderMessages() {
            const list = document.getElementById('msgList');
            const countEl = document.getElementById('msgCount');
            const msgs = await fetchMessages();
            if (msgs.length === 0) {
                list.innerHTML = '<div class="empty-msg">还没有留言，来做第一个吧 💌</div>';
                countEl.textContent = '';
                return;
            }
            countEl.textContent = `共 ${msgs.length} 条留言`;
            list.innerHTML = msgs.map(m => `
                <div class="msg-card">
                    <div class="msg-header">
                        <span class="msg-name">${esc(m.name)}</span>
                        <span class="msg-emoji">${esc(m.emoji || '')}</span>
                    </div>
                    <div class="msg-body">${esc(m.text)}</div>
                    <div class="msg-time">${formatTime(m.time)}</div>
                    <button class="msg-like" onclick="doLike('${m.id}', this)">❤️ ${m.likes || 0}</button>
                </div>
            `).join('');
        }

        document.getElementById('submitBtn').addEventListener('click', async () => {
            const btn = document.getElementById('submitBtn');
            const name = document.getElementById('msgName').value.trim();
            const text = document.getElementById('msgText').value.trim();
            if (!text) { alert('请输入留言内容'); return; }
            btn.disabled = true;
            btn.textContent = '发送中...';
            try {
                await postMessage({ name: name || '匿名', text, emoji: selectedEmoji });
                document.getElementById('msgText').value = '';
                document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
                selectedEmoji = '';
                await renderMessages();
            } catch (e) { alert('发送失败，请检查网络连接'); console.error(e); }
            btn.disabled = false;
            btn.textContent = '发送留言 ❤️';
        });

        let selectedEmoji = '';
        document.querySelectorAll('.emoji-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
                btn.classList.toggle('active');
                selectedEmoji = btn.classList.contains('active') ? btn.dataset.emoji : '';
            });
        });

        async function doLike(id, btn) {
            btn.disabled = true;
            try {
                const result = await likeMessage(id);
                btn.textContent = `❤️ ${result.likes}`;
                btn.classList.add('liked');
            } catch (e) { console.error('点赞失败:', e); }
            btn.disabled = false;
        }

        // 浮动爱心
        const bg = document.getElementById('heartsBg');
        const hearts = ['❤','💕','💗','💖','🩷'];
        for (let i = 0; i < 25; i++) {
            const s = document.createElement('span');
            s.textContent = hearts[Math.floor(Math.random() * hearts.length)];
            s.style.left = Math.random() * 100 + '%';
            s.style.fontSize = (14 + Math.random() * 18) + 'px';
            s.style.animationDuration = (8 + Math.random() * 12) + 's';
            s.style.animationDelay = Math.random() * 10 + 's';
            bg.appendChild(s);
        }

        renderMessages();
    </script>
</body>
</html>
