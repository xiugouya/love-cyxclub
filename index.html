<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>爱心节 · 九（3）班 | CYX俱乐部</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #fff5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      color: #333;
      line-height: 1.8;
    }
    /* 顶部横幅 */
    .hero {
      background: linear-gradient(135deg, #e74c3c 0%, #ff6b81 50%, #ff8e53 100%);
      color: #fff;
      text-align: center;
      padding: 80px 20px 60px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 40px;
      background: #fff5f5;
      clip-path: ellipse(55% 100% at 50% 100%);
    }
    .hero h1 {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 8px;
      text-shadow: 0 2px 10px rgba(0,0,0,0.15);
    }
    .hero .emoji-row {
      font-size: 2rem;
      margin-bottom: 16px;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .hero p {
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 500px;
      margin: 0 auto;
    }

    /* 内容区 */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* 赞助商横幅 */
    .sponsor {
      background: #fff;
      border: 2px solid #fecaca;
      border-radius: 16px;
      padding: 24px 32px;
      margin: -30px auto 40px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(231,76,60,0.08);
      position: relative;
    }
    .sponsor-badge {
      display: inline-block;
      background: linear-gradient(135deg, #e74c3c, #ff6b81);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      margin-bottom: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .sponsor h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .sponsor p {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }
    .sponsor a {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: #e74c3c;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: all 0.2s;
    }
    .sponsor a:hover {
      color: #c0392b;
      transform: translateX(3px);
    }

    /* 活动信息 */
    .section {
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .section h3 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #e74c3c;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section h3::before {
      content: '';
      display: inline-block;
      width: 4px;
      height: 22px;
      background: linear-gradient(180deg, #e74c3c, #ff6b81);
      border-radius: 2px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
    }
    .info-card {
      background: #fef9f9;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .info-card .icon { font-size: 2rem; margin-bottom: 8px; }
    .info-card .label {
      font-size: 0.75rem;
      color: #999;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
    }
    .info-card .value {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    /* 留言板 */
    .guestbook { margin-bottom: 40px; }

    .msg-form {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }
    .msg-form .row {
      display: flex;
      gap: 12px;
      margin-bottom: 12px;
    }
    .msg-form input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #f0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .msg-form input:focus { border-color: #e74c3c; }
    .msg-form textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #f0e0e0;
      border-radius: 10px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 80px;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    .msg-form textarea:focus { border-color: #e74c3c; }
    .msg-form .emoji-row-input {
      display: flex;
      gap: 6px;
      margin: 10px 0;
      flex-wrap: wrap;
    }
    .msg-form .emoji-btn {
      background: #fef5f5;
      border: 1.5px solid #f0e0e0;
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .msg-form .emoji-btn:hover,
    .msg-form .emoji-btn.active {
      background: #fee;
      border-color: #e74c3c;
      transform: scale(1.15);
    }
    .msg-form .submit-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #e74c3c, #ff6b81);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
      font-family: inherit;
    }
    .msg-form .submit-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(231,76,60,0.3);
    }

    /* 留言列表 */
    .msg-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .msg-card {
      background: #fff;
      border-radius: 14px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
      position: relative;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .msg-card .msg-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .msg-card .msg-name {
      font-weight: 700;
      color: #e74c3c;
      font-size: 0.95rem;
    }
    .msg-card .msg-emoji {
      font-size: 1.3rem;
    }
    .msg-card .msg-body {
      color: #444;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .msg-card .msg-time {
      font-size: 0.75rem;
      color: #bbb;
    }
    .msg-card .msg-like {
      position: absolute;
      top: 16px;
      right: 16px;
      background: none;
      border: 1.5px solid #f0e0e0;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      color: #999;
    }
    .msg-card .msg-like:hover,
    .msg-card .msg-like.liked {
      border-color: #e74c3c;
      color: #e74c3c;
      background: #fef5f5;
    }
    .empty-msg {
      text-align: center;
      color: #ccc;
      padding: 40px 20px;
      font-size: 0.95rem;
    }

    /* 页脚 */
    .footer {
      text-align: center;
      padding: 40px 20px;
      color: #bbb;
      font-size: 0.8rem;
    }
    .footer a { color: #e74c3c; text-decoration: none; }

    @media (max-width: 600px) {
      .hero h1 { font-size: 2rem; }
      .section { padding: 24px; }
      .msg-form .row { flex-direction: column; }
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="emoji-row">❤️ 🔥 ❤️</div>
    <h1>爱心节</h1>
    <p>九（3）班 · 让爱传递，温暖每一颗心</p>
  </div>

  <div class="container">

    <!-- 赞助商横幅 -->
    <div class="sponsor">
      <div class="sponsor-badge">独家赞助</div>
      <h2>🌟 CYX俱乐部 独家赞助 🌟</h2>
      <p>本活动由 CYX俱乐部 独家赞助支持</p>
      <a href="https://cyxclub.top">前往 cyxclub.top →</a>
    </div>

    <!-- 活动信息 -->
    <div class="section">
      <h3>活动信息</h3>
      <div class="info-grid">
        <div class="info-card">
          <div class="icon">🏫</div>
          <div class="label">班级</div>
          <div class="value">九（3）班</div>
        </div>
        <div class="info-card">
          <div class="icon">💝</div>
          <div class="label">活动</div>
          <div class="value">爱心节</div>
        </div>
      </div>
    </div>

    <!-- 留言板 -->
    <div class="section guestbook">
      <h3>留言板</h3>
      <p style="color:#888; margin-bottom:20px; font-size:0.9rem;">写下你对九（3）班爱心节的祝福吧 ✨</p>

      <!-- 留言表单 -->
      <div class="msg-form">
        <div class="row">
          <input type="text" id="msgName" placeholder="你的昵称" maxlength="20">
        </div>
        <textarea id="msgText" placeholder="写下你的留言..." maxlength="300"></textarea>
        <div class="emoji-row-input" id="emojiRow">
          <button class="emoji-btn" data-emoji="❤️">❤️</button>
          <button class="emoji-btn" data-emoji="🥰">🥰</button>
          <button class="emoji-btn" data-emoji="👏">👏</button>
          <button class="emoji-btn" data-emoji="🎉">🎉</button>
          <button class="emoji-btn" data-emoji="🔥">🔥</button>
          <button class="emoji-btn" data-emoji="💪">💪</button>
          <button class="emoji-btn" data-emoji="✨">✨</button>
          <button class="emoji-btn" data-emoji="🌈">🌈</button>
          <button class="emoji-btn" data-emoji="🌻">🌻</button>
          <button class="emoji-btn" data-emoji="🕊️">🕊️</button>
        </div>
        <button class="submit-btn" id="submitBtn">发送留言 ❤️</button>
      </div>

      <!-- 留言列表 -->
      <div class="msg-list" id="msgList">
        <div class="empty-msg">还没有留言，来做第一个吧 💌</div>
      </div>
    </div>

  </div>

  <div class="footer">
    <p>由 <a href="https://cyxclub.top">CYX俱乐部</a> 独家赞助 ❤️</p>
    <p style="margin-top:4px;">love.cyxclub.top</p>
  </div>

  <script>
    // 使用 localStorage 存储留言（纯前端方案）
    const STORAGE_KEY = 'love_guestbook_messages';

    function getMessages() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
      } catch { return []; }
    }

    function saveMessages(msgs) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(msgs));
    }

    function formatTime(ts) {
      const d = new Date(ts);
      const pad = n => String(n).padStart(2, '0');
      return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
    }

    function renderMessages() {
      const list = document.getElementById('msgList');
      const msgs = getMessages();
      if (msgs.length === 0) {
        list.innerHTML = '<div class="empty-msg">还没有留言，来做第一个吧 💌</div>';
        return;
      }
      // 最新的在前面
      list.innerHTML = msgs.slice().reverse().map((m, i) => {
        const realIndex = msgs.length - 1 - i;
        const liked = (m.likedBy || []).includes(getMyId());
        return `
          <div class="msg-card">
            <div class="msg-header">
              <span class="msg-name">${esc(m.name || '匿名')}</span>
              <span class="msg-emoji">${esc(m.emoji || '')}</span>
            </div>
            <div class="msg-body">${esc(m.text)}</div>
            <div class="msg-time">${formatTime(m.time)}</div>
            <button class="msg-like ${liked ? 'liked' : ''}" onclick="toggleLike(${realIndex})">
              ❤️ ${m.likes || 0}
            </button>
          </div>`;
      }).join('');
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function getMyId() {
      let id = localStorage.getItem('love_guestbook_uid');
      if (!id) {
        id = 'u_' + Math.random().toString(36).slice(2, 10);
        localStorage.setItem('love_guestbook_uid', id);
      }
      return id;
    }

    // 选择 emoji
    let selectedEmoji = '';
    document.querySelectorAll('.emoji-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
        btn.classList.toggle('active');
        selectedEmoji = btn.classList.contains('active') ? btn.dataset.emoji : '';
      });
    });

    // 提交留言
    document.getElementById('submitBtn').addEventListener('click', () => {
      const name = document.getElementById('msgName').value.trim();
      const text = document.getElementById('msgText').value.trim();
      if (!text) { alert('请输入留言内容'); return; }

      const msgs = getMessages();
      msgs.push({
        name: name || '匿名',
        text,
        emoji: selectedEmoji,
        time: Date.now(),
        likes: 0,
        likedBy: []
      });
      saveMessages(msgs);

      document.getElementById('msgText').value = '';
      document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('active'));
      selectedEmoji = '';
      renderMessages();
    });

    // 点赞
    function toggleLike(idx) {
      const msgs = getMessages();
      const uid = getMyId();
      const m = msgs[idx];
      if (!m) return;
      if (!m.likedBy) m.likedBy = [];
      const pos = m.likedBy.indexOf(uid);
      if (pos >= 0) {
        m.likedBy.splice(pos, 1);
        m.likes = Math.max(0, (m.likes || 0) - 1);
      } else {
        m.likedBy.push(uid);
        m.likes = (m.likes || 0) + 1;
      }
      saveMessages(msgs);
      renderMessages();
    }

    // 初始渲染
    renderMessages();
  </script>
</body>
</html>
